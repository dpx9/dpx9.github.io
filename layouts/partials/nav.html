<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="/">
      <span class="brand-mark">dp</span>
      <span class="brand-text">Dheeraj Prakash</span>
    </a>

    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">Menu</button>

    <nav id="nav-menu" class="nav-menu" aria-label="Main navigation">
      {{ range site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
      {{ end }}
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark and light mode">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2"></circle>
          <path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"></path>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16.8 14.2A7 7 0 0 1 9.8 7.2a7.1 7.1 0 0 1 .6-2.9A8.5 8.5 0 1 0 19.7 14a6.8 6.8 0 0 1-2.9.2Z"></path>
        </svg>
      </button>
    </nav>
  </div>
  <div class="container nav-question-bar" aria-label="Homepage quick questions">
    <a href="/#who-i-am" class="nav-question-item">Who I am?</a>
    <a href="/#what-i-do" class="nav-question-item">What I do?</a>
    <a href="/#why-hire-me" class="nav-question-item">Why should you hire me?</a>
  </div>
</header>
